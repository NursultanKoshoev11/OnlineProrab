services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
