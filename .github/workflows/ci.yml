name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: onlineprorab
          POSTGRES_USER: onlineprorab
          POSTGRES_PASSWORD: onlineprorab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onlineprorab -d onlineprorab"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://onlineprorab:onlineprorab@localhost:5432/onlineprorab?sslmode=disable
      JWT_SECRET: ci-only-secret
      ACCESS_TOKEN_TTL_MINUTES: 60
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      MAX_UPLOAD_MB: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Download dependencies
        run: go mod download

      - name: Prepare dependency lockfile
        run: go mod tidy

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build API
        run: go build ./cmd/api

      - name: Smoke build startup
        run: timeout 10s go run ./cmd/api || test $? -eq 124

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug
