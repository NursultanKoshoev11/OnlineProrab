name: backend

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: backend/go.sum
      - run: go mod download
        working-directory: backend
      - run: go vet ./...
        working-directory: backend
      - run: go test -race ./...
        working-directory: backend
      - run: go build ./cmd/api
        working-directory: backend
