name: Backend Production Checks

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-production.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-production.yml'

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: backend/go.sum
      - name: Download dependencies
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Race tests
        run: go test -race ./...
      - name: Build
        run: go build ./cmd/api
