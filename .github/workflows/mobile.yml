name: Mobile CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'

jobs:
  flutter-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Prepare Android platform
        run: python3 tool/prepare_android.py

      - name: Install dependencies
        run: flutter pub get

      - name: Format sources for verification build
        run: dart format lib test

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=API_BASE_URL=http://127.0.0.1:8080
